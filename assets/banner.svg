<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Bellows - MCP hands for a local model fleet">
  <defs>
    <radialGradient id="glow-be" cx="0.22" cy="0.5" r="0.75">
      <stop offset="0" stop-color="#d4442c" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#d4442c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge-be" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4442c"/>
      <stop offset="1" stop-color="#d4442c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="#1a1413"/>
  <rect width="1280" height="320" fill="url(#glow-be)"/>

  <!-- faint oversized mark, right side texture -->
  <g transform="translate(1010,40) scale(3.4)" opacity="0.05">
    <path d="M6 34 l22 -18 v10 l14 0 v16 l-14 0 v10 z" fill="#d4442c"/>
    <path d="M50 26 h16 M50 34 h22 M50 42 h16" stroke="#d4442c" stroke-width="6" stroke-linecap="round"/>
