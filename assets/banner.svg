    <path d="M52 21 h20 M52 30 h30 M52 39 h20" stroke="#d4442c" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <circle cx="92" cy="30" r="4" fill="#d4442c"/>
  </g>

  <!-- wordmark -->
  <text x="208" y="163" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="64" font-weight="700" letter-spacing="-1" fill="#f2ebe7">bellows</text>
  <text x="210" y="205" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="21" fill="#b6a69e">MCP hands for a local model fleet.</text>

  <text x="210" y="243" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="14" fill="#80706a">Model Context Protocol · llama-server supervision · smoke tests · eval history</text>

  <rect x="96" y="272" width="420" height="2" fill="url(#edge-be)"/>
